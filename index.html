<!doctype html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta
    name="viewport"
    content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0"
  >
  <title>Danil Yakimenko - Frontend Developer.</title>
  <script
    type="module"
    src="./src/main.js"
  ></script>
</head>
<body>
<header class="header" data-js-overlay-menu>
  <div class="header__inner container">
    <a
      class="header__logo logo"
      href="/"
      title="To home page"
      aria-label="Home page"
    >
      <svg
        width="64px"
        height="64px"
        viewBox="0 0 24 24"
        fill="none"
        xmlns="http://www.w3.org/2000/svg"
        stroke="#ffffff"
      >
        <g
          id="SVGRepo_bgCarrier"
          stroke-width="0"
        />
        <g
          id="SVGRepo_tracerCarrier"
          stroke-linecap="round"
          stroke-linejoin="round"
        />
        <g id="SVGRepo_iconCarrier">
          <path
            d="M12 2C6.48 2 2 6.48 2 12C2 17.52 6.48 22 12 22C17.52 22 22 17.52 22 12C22 6.48 17.52 2 12 2ZM8.53 13.47C8.82 13.76 8.82 14.24 8.53 14.53C8.38 14.68 8.19 14.75 8 14.75C7.81 14.75 7.62 14.68 7.47 14.53L5.47 12.53C5.18 12.24 5.18 11.76 5.47 11.47L7.47 9.47C7.76 9.18 8.24 9.18 8.53 9.47C8.82 9.76 8.82 10.24 8.53 10.53L7.06 12L8.53 13.47ZM13.69 9.96L11.69 14.63C11.57 14.91 11.29 15.08 11 15.08C10.9 15.08 10.8 15.06 10.71 15.02C10.33 14.86 10.15 14.42 10.32 14.03L12.32 9.36C12.48 8.98 12.92 8.8 13.3 8.97C13.68 9.14 13.85 9.58 13.69 9.96ZM18.53 12.53L16.53 14.53C16.38 14.68 16.19 14.75 16 14.75C15.81 14.75 15.62 14.68 15.47 14.53C15.18 14.24 15.18 13.76 15.47 13.47L16.94 12L15.47 10.53C15.18 10.24 15.18 9.76 15.47 9.47C15.76 9.18 16.24 9.18 16.53 9.47L18.53 11.47C18.82 11.76 18.82 12.24 18.53 12.53Z"
            fill="#ffffff"
          />
        </g>
      </svg>
    </a>
    <dialog class="header__overlay-menu-dialog" data-js-overlay-menu-dialog>
      <nav class="header__menu">
        <ul class="header__menu-list">
          <li class="header__menu-item">
            <a
              class="header__menu-link"
              href="#about"
            >
              About
            </a>
          </li>
          <li class="header__menu-item">
            <a
              class="header__menu-link"
              href="#skills"
            >
              Skills
            </a>
          </li>
          <li class="header__menu-item">
            <a
              class="header__menu-link"
              href="#portfolio"
            >
              Portfolio
            </a>
          </li>
          <li class="header__menu-item">
            <a
              class="header__menu-link"
              href="#contacts"
            >
              Contacts
            </a>
          </li>
        </ul>
      </nav>
    </dialog>
    <div class="header__wrapper">
    <label class="header__theme-switcher theme-switcher" title="Switch theme">
      <span class="visually-hidden">Switch theme</span>
      <input
        class="theme-switcher__checkbox visually-hidden"
        type="checkbox"
      />
      <span class="theme-switcher__body">
          <span class="theme-switcher__icon-wrapper theme-switcher__icon-wrapper--dark-theme">
            <svg
              xmlns="http://www.w3.org/2000/svg"
              width="24"
              height="24"
              viewBox="0 0 32 32"
            >
    <path d="M10.895 7.574c0 7.55 5.179 13.67 11.567 13.67 1.588 0 3.101-.38 4.479-1.063-1.695 4.46-5.996 7.636-11.051 7.636-6.533 0-11.83-5.297-11.83-11.83 0-4.82 2.888-8.959 7.023-10.803a16 16 0 0 0-.188 2.39" />
</svg>
          </span>
          <span class="theme-switcher__icon-wrapper theme-switcher__icon-wrapper--light-theme">
            <svg
              xmlns="http://www.w3.org/2000/svg"
              width="24"
              height="24"
              fill="none"
              viewBox="0 0 24 24"
            >
    <g fill="#000">
        <path d="M12 19a7 7 0 1 0 0-14 7 7 0 0 0 0 14M12 22.96c-.55 0-1-.41-1-.96v-.08c0-.55.45-1 1-1s1 .45 1 1-.45 1.04-1 1.04m7.14-2.82c-.26 0-.51-.1-.71-.29l-.13-.13a.996.996 0 1 1 1.41-1.41l.13.13a.996.996 0 0 1-.7 1.7m-14.28 0c-.26 0-.51-.1-.71-.29a.996.996 0 0 1 0-1.41l.13-.13a.996.996 0 1 1 1.41 1.41l-.13.13c-.19.19-.45.29-.7.29M22 13h-.08c-.55 0-1-.45-1-1s.45-1 1-1 1.04.45 1.04 1-.41 1-.96 1M2.08 13H2c-.55 0-1-.45-1-1s.45-1 1-1 1.04.45 1.04 1-.41 1-.96 1m16.93-7.01c-.26 0-.51-.1-.71-.29a.996.996 0 0 1 0-1.41l.13-.13a.996.996 0 1 1 1.41 1.41l-.13.13c-.19.19-.44.29-.7.29m-14.02 0c-.26 0-.51-.1-.71-.29l-.13-.14a.996.996 0 1 1 1.41-1.41l.13.13c.39.39.39 1.02 0 1.41-.19.2-.45.3-.7.3M12 3.04c-.55 0-1-.41-1-.96V2c0-.55.45-1 1-1s1 .45 1 1-.45 1.04-1 1.04" />
    </g>
</svg>
          </span>
        </span>
    </label>
    <button
      class="header__burger-button burger-button visible-mobile"
      type="button"
      aria-label="Open mobile menu"
      title="Open mobile menu"
      data-js-overlay-menu-burger-button
    >
      <svg
        class="burger-button__svg"
        width="30"
        height="30"
        viewBox="0 0 100 100"
      >
        <path
          class="burger-button__line burger-button__line--1"
          d="M 20,29.000046 H 80.000231 C 80.000231,29.000046 94.498839,28.817352 94.532987,66.711331 94.543142,77.980673 90.966081,81.670246 85.259173,81.668997 79.552261,81.667751 75.000211,74.999942 75.000211,74.999942 L 25.000021,25.000058"
        />
        <path
          class="burger-button__line burger-button__line--2"
          d="M 20,50 H 80"
        />
        <path
          class="burger-button__line burger-button__line--3"
          d="M 20,70.999954 H 80.000231 C 80.000231,70.999954 94.498839,71.182648 94.532987,33.288669 94.543142,22.019327 90.966081,18.329754 85.259173,18.331003 79.552261,18.332249 75.000211,25.000058 75.000211,25.000058 L 25.000021,74.999942"
        />
      </svg>
    </button>
    </div>
  </div>
</header>

</body>
</html>
